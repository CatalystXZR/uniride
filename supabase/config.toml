# https://supabase.com/docs/guides/cli/config
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
# Site URL — must match APP_BASE_URL in production
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://turnoapp.cl", "http://localhost:5000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # Set true in production

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
